<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>States of Fragility — Snail</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Display:wdth,wght@87.5,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff; /**#f4f1ec;**/
        --panel: #ffffff;
        --text: #1c1b22;
        --muted: #8a8898;
        --border: #ddd9d2;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Noto Sans Display", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        max-width: 900px;
        margin:auto;
      }
      header {
        background: #1c1b22;
        padding: 14px 32px;
        display: flex;
        align-items: center;
        border-bottom: 3px solid #bf3a2b;
      }
      .logo {
        font-family: "Noto Sans Display", sans-serif;
        font-size: 17px;
        font-weight: 600;
        color: #fff;
      }
      .logo em {
        color: #bf3a2b;
        font-style: normal;
      }
      .logo-sub {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.42);
        letter-spacing: 0.11em;
        text-transform: uppercase;
        margin-top: 2px;
      }
      .oecd-badge {
        margin-left: auto;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .page {
        display: flex;
        flex: 1;
        overflow: hidden;
        flex-direction: column;
      }

      /* Top Bar */
      .sidebar {
        width: 100%;
        flex-shrink: 0;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        padding: 15px 20px;
        display: flex;
        flex-direction: row;
        gap: 30px;
        align-items: flex-start;
        overflow-x: auto;
        overflow-y: hidden;
      }
      .sidebar h2 {
        font-family: "Noto Sans Display", sans-serif;
        font-size: 14px;
        font-weight: 600;
        line-height: 1.4;
      }
      .sidebar > div:not(.search-wrap) {
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .sidebar p {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.6;
        margin-top: 5px;
        max-width: 310px;
      }
      .sec-label {
        font-size: 9.5px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
        margin-bottom: 8px;
        white-space: nowrap;
      }
      hr {
        border: none;
        border-left: 1px solid var(--border);
        height: 40px;
        margin: 0;
      }

      .dim-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .dim-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 7px;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .dim-row:hover {
        background: #eee9e2;
      }
      .dim-row.active {
        background: #e8e2d8;
      }
      .dim-row.faded {
        opacity: 0.28;
      }
      .dim-chip {
        width: 9px;
        height: 9px;
        border-radius: 2px;
        flex-shrink: 0;
      }
      .dim-name {
        font-size: 11.5px;
        font-weight: 500;
        flex: 1;
      }
      .dim-ring {
        font-size: 9px;
        color: var(--muted);
      }

      .scale-row {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-bottom: 4px;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .scale-row:hover {
        opacity: 0.7;
      }
      .scale-row.active {
        opacity: 1;
      }
      .scale-row.faded {
        opacity: 0.28;
      }
      .scale-bar {
        flex: 1;
        height: 7px;
        border-radius: 3px;
        overflow: hidden;
      }
      .scale-swatches {
        display: flex;
        gap: 2px;
        flex: 1;
      }
      .scale-swatch {
        flex: 1;
        height: 10px;
        width:10px;
        border-radius: 2px;
      }
      .scale-end {
        font-size: 14px;
        color: var(--muted);
        white-space: nowrap;
      }
      .scale-name {
        padding-left:10px;
        font-size: 14px;
        font-weight: 500;
        width: 96px;
      }

      .tier-list {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .tier-row {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 2px 0;
      }
      .tier-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .tier-name {
        font-size: 11px;
        flex: 1;
      }
      .tier-n {
        font-size: 10px;
        color: var(--muted);
      }

      .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .stat-box {
        background: var(--bg);
        border-radius: 5px;
        padding: 9px 9px 7px;
      }
      .stat-val {
        font-family: "Noto Sans Display", sans-serif;
        font-size: 19px;
        font-weight: 600;
        line-height: 1;
      }
      .stat-val sup {
        font-size: 10px;
        opacity: 0.55;
      }
      .stat-lbl {
        font-size: 9.5px;
        color: var(--muted);
        margin-top: 3px;
        line-height: 1.3;
      }

      .search-wrap {
        position: relative;
      }
      .search-wrap {
        flex-shrink: 0;
      }
      .search-wrap input {
        font-family: "Noto Sans Display", sans-serif;
        font-size: 11.5px;
        width: 200px;
        padding: 6px 28px 6px 11px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--bg);
        color: var(--text);
        outline: none;
        transition: border-color 0.2s;
      }
      .search-wrap input:focus {
        border-color: #bf3a2b;
      }
      .search-wrap .s-icon {
        position: absolute;
        right: 9px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 13px;
        color: var(--muted);
        pointer-events: none;
      }

      /* Chart */
      .chart-area {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 8px;
        position: relative;
      }
      #snail-svg {
        display: block;
        max-width: 100%;
        max-height: 100%;
      }

      #scale-legend-block {
        position: absolute;
        font-family: "Noto Sans Display", sans-serif;
        font-size: 14px;
        top: 40px;
        left: 40px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 16px;
        max-width: 310px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        z-index: 10;
      }

      /* Tooltip */
      #tt {
        position: fixed;
        pointer-events: none;
        z-index: 200;
        width: 226px;
        background: #ffffff;
        color: #000000;
        border-radius: 8px;
        padding: 12px 14px 11px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.36);
        font-size: 11.5px;
        opacity: 0;
        transition: opacity 0.12s;
        border-top: 3px solid #101d40;
      }
      #tt.on {
        opacity: 1;
      }
      #tt .tt-name {
        font-family: "Noto Sans Display", sans-serif;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 1px;
      }
      #tt .tt-tier {
        font-size: 9.5px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        opacity: 0.62;
        margin-bottom: 9px;
      }
      #tt .tt-dims {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      #tt .tt-dr {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #tt .tt-dn {
        width: 82px;
        font-size: 9.5px;
        opacity: 0.58;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        flex-shrink: 0;
      }
      #tt .tt-bg {
        flex: 1;
        height: 4px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }
      #tt .tt-fill {
        height: 100%;
        border-radius: 2px;
      }
      #tt .tt-dv {
        font-size: 0px;
        width: 22px;
        text-align: right;
        opacity: 0.62;
      }
      #tt .tt-total {
        margin-top: 9px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.09);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #tt .tt-tl {
        font-size: 0px;
        opacity: 0.5;
      }
      #tt .tt-tv {
        font-family: "Noto Sans Display", sans-serif;
        font-size: 0px;
        font-weight: 600;
      }
    </style>
  </head>

      <!-- CHART -->
      <div class="chart-area">
        <svg
          id="snail-svg"
          viewBox="0 0 960 780"
          xmlns="http://www.w3.org/2000/svg"
        ></svg>
        <div id="scale-legend-block">
          <!--<div class="sec-label">State of fragility</div>-->

    <div id="tt">
      <div class="tt-name" id="tt-name"></div>
      <div class="tt-tier" id="tt-tier"></div>
      <div class="tt-dims" id="tt-dims"></div>
      <div class="tt-total">
        <span class="tt-tl" id="tt-total-label">Overall Score</span>
        <span class="tt-tv" id="tt-tv"></span>
      </div>
    </div>

    <script>
      // ─── DATA & I18N ──────────────────────────────────────────────────────────────
      Promise.all([
        d3.tsv("data-new.tsv", (d) => {
          // Fix European comma decimal separator before autoType
          const fixed = {};
          for (const [k, v] of Object.entries(d)) {
            fixed[k] = typeof v === "string" ? v.replace(",", ".") : v;
          }
          return d3.autoType(fixed);
        }),
        d3.json("locales.json"),
      ]).then(([contexts, locales]) => {
        const lang = new URLSearchParams(window.location.search).get("lang") || "en";
        const t = locales[lang] || locales["en"];

        // Apply static DOM translations
        document.title = t.title;
        const searchEl = document.getElementById("search");
        if (searchEl) searchEl.placeholder = t.search_placeholder;
        document.getElementById("legend-hint").textContent = t.legend_hint;
        document.getElementById("tt-total-label").textContent = t.overall_score;

        const nameKey = lang === "fr" ? "country-fr" : "country";

      // ─── DIMENSIONS ───────────────────────────────────────────────────────────────
      const dims = [
        { key: "soc", label: t.dims.soc, color: "#464E70" },
        { key: "sec", label: t.dims.sec, color: "#F2AE00" },
        { key: "pol", label: t.dims.pol, color: "#9D2EBD" },
        { key: "hum", label: t.dims.hum, color: "#C63963" },
        { key: "env", label: t.dims.env, color: "#46AEA7" },
        { key: "eco", label: t.dims.eco, color: "#7A473E" },
      ];

      // Categorical scale: 1 = most fragile (full color), 5 = least fragile (pale)

      // ─── HELPERS ──────────────────────────────────────────────────────────────────
      function paleTint(hex, s) {
        const c = d3.color(hex);
        return d3
          .rgb(
            c.r + (255 - c.r) * s,
            c.g + (255 - c.g) * s,
            c.b + (255 - c.b) * s,
          )
          .formatHex();
      }

      function dimFill(dimKey, ctx) {
        const d = dims.find((x) => x.key === dimKey);
        const cat = ctx[dimKey]; // 1 (most fragile) → 5 (least fragile)
        const tintAmount = (cat - 1) / 4 * 0.88;
        return paleTint(d.color, tintAmount);
      }

      // ─── BUILD SCALE LEGEND ────────────────────────────────────────────────────────
      [...dims].reverse().forEach((d) => {
        const row = document.createElement("div");
        row.className = "scale-row";
        row.dataset.key = d.key;
        const swatches = [1, 2, 3, 4, 5].map(cat => {
          const color = paleTint(d.color, (cat - 1) / 4 * 0.88);
          return `<div class="scale-swatch" style="background:${color}" title="${t.category} ${cat}"></div>`;
        }).join("");
        row.innerHTML = `
      <span class="scale-end">${t.scale_extreme}</span>
      <div class="scale-swatches">${swatches}</div>
      <span class="scale-end">${t.scale_minor}</span>
      <span class="scale-name" style="color:${d.color}">${d.label}</span>`;
        document.getElementById("scale-legend").appendChild(row);
      });

      // ─── SORTING & REDRAW ─────────────────────────────────────────────────────────
      let sortByDim = null; // Track which dimension we're sorting by
      let arcGroups = []; // Will hold arc group data

      function redrawVisualization() {
        // Clear previous SVG content except background
        d3.selectAll(".seg-group").remove();
        arcGroups = [];

        // Create a sorted copy of contexts
        let sortedContexts = [...contexts];
        if (sortByDim) {
          sortedContexts.sort((a, b) => a[sortByDim] - b[sortByDim]);
        } else {
          sortedContexts.sort((a, b) => a.overall - b.overall);
        }

        // Redraw segments in new order
        sortedContexts.forEach((ctx, i) => {
          drawSegment(ctx, i, sortedContexts);
        });
      }

      function drawSegment(ctx, i, sortedContexts) {
        const t0 = angleStart + i * (segAngle + gapAngle);
        const t1 = t0 + segAngle;
        const tMid = (t0 + t1) / 2;

        const g = svg.append("g").attr("class", "seg-group").attr("data-i", i);
        const patches = [];

        // 6 dim rings
        dims.forEach((dim, j) => {
          const rIn = innerR + j * ringThick;
          const rOut = innerR + (j + 1) * ringThick;
          const fill = dimFill(dim.key, ctx);

          const path = g
            .append("path")
            .attr("transform", `translate(${cx},${cy})`)
            .attr(
              "d",
              arcGen({
                innerRadius: rIn,
                outerRadius: rOut,
                startAngle: t0,
                endAngle: t1,
              }),
            )
            .attr("fill", fill)
            .attr("stroke", "#FFFFFF")
            .attr("stroke-width", 0.5);

          patches.push({ path, dim, j, fill });
        });

        // Thin tier marker on inner edge
        const tierCol = ctx.tier === "extreme" ? "#BF3A2B" : "#E07B39";
        g.append("path")
          .attr("transform", `translate(${cx},${cy})`)
          .attr(
            "d",
            arcGen({
              innerRadius: innerR - 8,
              outerRadius: innerR - 2,
              startAngle: t0,
              endAngle: t1,
            }),
          )
          .attr("fill", tierCol)
          .attr("opacity", 0.8);

        // Ghost arc for hover
        g.append("path")
          .attr("transform", `translate(${cx},${cy})`)
          .attr(
            "d",
            arcGen({
              innerRadius: innerR - 9,
              outerRadius: outerR + 3,
              startAngle: t0,
              endAngle: t1,
            }),
          )
          .attr("fill", "transparent")
          .attr("cursor", "pointer")
          .on("mousemove", (ev) => showTip(ev, ctx, i, patches))
          .on("mouseleave", () => {
            hideTip();
            if (highlighted === null) resetAll();
          })
          .on("click", () => handleClick(i));

        // ── Country name label
        const labelR = outerR + 12;
        const lx = cx + labelR * Math.sin(tMid);
        const ly = cy - labelR * Math.cos(tMid);

        const tMidDeg = ((((tMid * 180) / Math.PI) % 360) + 360) % 360;
        const flip = tMidDeg > 180;
        const rotDeg = tMidDeg - 90 + (flip ? 180 : 0);
        const anchor = flip ? "end" : "start";

        g.append("text")
          .attr("class", "ctry-lbl")
          .attr("transform", `translate(${lx},${ly}) rotate(${rotDeg})`)
          .attr("text-anchor", anchor)
          .attr("dominant-baseline", "middle")
          .attr("font-family", "'Noto Sans Display',sans-serif")
          .attr("font-size", ctx.tier === "extreme" ? 14.0 : 11.0)
          .attr("font-weight", ctx.tier === "extreme" ? 500 : 400)
          .attr("fill", ctx.tier === "extreme" ? "#271010" : "#505060")
          .style("pointer-events", "none")
          .text(ctx[nameKey]);

        arcGroups.push({ ctx, patches, g });
      }

      // ─── SVG SETUP ────────────────────────────────────────────────────────────────
      const W = 750,
        H = 750;
      const cx = 482,
        cy = 375;

      // Geometry
      const innerR = 75;
      const outerR = 275;
      const bandThick = outerR - innerR; // 195
      const ringThick = bandThick / dims.length; // 32.5 each
      const N = contexts.length; // 61

      // 270° arc: opens at bottom, most fragile at left side (225°), least at right (135°)
      const totalAngle = Math.PI * 1.5; // 270°
      const angleStart = Math.PI * 0; // 225° = lower-left (d3: 0=top, CW)
      const gapAngle = 0.01; // thin gap between countries
      const segAngle = (totalAngle - N * gapAngle) / N;

      const svg = d3.select("#snail-svg");
      const arcGen = d3.arc();

      // Background
      svg
        .append("rect")
        .attr("width", W)
        .attr("height", H)
        //.attr("fill", "#F4F1EC");
        .attr("fill", "#FFFFFF");

      // ── Title ─────────────────────────────────────────────────────────────────────
      /*      svg
        .append("text")
        .attr("x", cx)
        .attr("y", 36)
        .attr("text-anchor", "middle")
        .attr("font-family", "'Noto Sans Display',sans-serif")
        .attr("font-size", 18)
        .attr("font-weight", 600)
        .attr("fill", "#1C1B22")
        .text("The Fragility Snail · 2025");

      svg
        .append("text")
        .attr("x", cx)
        .attr("y", 54)
        .attr("text-anchor", "middle")
        .attr("font-family", "'Noto Sans Display',sans-serif")
        .attr("font-size", 10.5)
        .attr("fill", "#999")
        .text(
          "61 fragile contexts · 6 dimensions · ordered most → least fragile",
        );
*/
      // ── Center medallion ──────────────────────────────────────────────────────────
      const cg = svg.append("g").attr("transform", `translate(${cx},${cy})`);
      cg.append("circle")
        .attr("r", innerR - 5)
        .attr("fill", "#FFFFFF");
      cg.append("circle")
        .attr("r", innerR - 5)
        .attr("fill", "none")
        .attr("stroke", "#FFFFFF")
        .attr("stroke-width", 1.5);
      t.center.forEach((w, i) => {
        cg.append("text")
          .attr("text-anchor", "middle")
          .attr("y", (i - 0.5) * 13 -5)
          .attr("font-family", "'Noto Sans Displays',sans-serif")
          .attr("font-size", 9.5)
          .attr("font-weight", 600)
          .attr("fill", "#888")
          .attr("letter-spacing", "0.1em")
          .text(w);
      });

      // ── Endpoint annotations ──────────────────────────────────────────────────────
      /**  const annoR = outerR + 60;
      // Start: lower-left  (225°)
      {
        const ax = cx + annoR * Math.sin(angleStart - 0.08);
        const ay = cy - annoR * Math.cos(angleStart - 0.08);
        svg
          .append("text")
          .attr("x", ax)
          .attr("y", ay)
          .attr("text-anchor", "end")
          .attr("font-family", "'Noto Sans Display',sans-serif")
          .attr("font-size", 9)
          .attr("font-weight", 600)
          .attr("fill", "#BF3A2B")
          .attr("letter-spacing", "0.07em")
          .text("← MOST FRAGILE");
      }
      // End: lower-right (135°, = angleStart + totalAngle)
      {
        const angleEnd = angleStart + totalAngle;
        const ax = cx + annoR * Math.sin(angleEnd + 0.08);
        const ay = cy - annoR * Math.cos(angleEnd + 0.08);
        svg
          .append("text")
          .attr("x", ax)
          .attr("y", ay)
          .attr("text-anchor", "start")
          .attr("font-family", "'Noto Sans Display',sans-serif")
          .attr("font-size", 9)
          .attr("font-weight", 600)
          .attr("fill", "#888")
          .attr("letter-spacing", "0.07em")
          .text("LEAST FRAGILE →");
      }
**/
      // Initial draw
      redrawVisualization();

      // ── Bottom ring legend ────────────────────────────────────────────────────────
      /** const legY = H - 22;
      const legW = dims.length * 110;
      const legX0 = cx - legW / 2;
      dims.forEach((d, j) => {
        const lx = legX0 + j * 110;
        svg
          .append("rect")
          .attr("x", lx)
          .attr("y", legY - 9)
          .attr("width", 9)
          .attr("height", 9)
          .attr("rx", 2)
          .attr("fill", d.color);
        svg
          .append("text")
          .attr("x", lx + 13)
          .attr("y", legY - 1)
          .attr("font-family", "'Noto Sans Display',sans-serif")
          .attr("font-size", 9.5)
          .attr("fill", "#666")
          .text(`${d.label}`);
        //.text(`R${j + 1} — ${d.label}`);
      });
**/
      // ── STATE & INTERACTION ───────────────────────────────────────────────────────
      let activeDim = null;
      let highlighted = null;
      const tt = document.getElementById("tt");

      function showTip(ev, ctx, i, patches) {
        // Dim all other segments
        arcGroups.forEach((ag, j) => {
          const fade = j !== i;
          ag.patches.forEach(({ path }) =>
            path.attr("opacity", fade ? 0.13 : 1),
          );
          ag.g.selectAll(".ctry-lbl").attr("fill-opacity", fade ? 0.15 : 1);
        });

        // Fill tooltip
        document.getElementById("tt-name").textContent = ctx[nameKey];
        const tierEl = document.getElementById("tt-tier");
        tierEl.textContent =
          ctx.tier === "extreme" ? t.tier_extreme : t.tier_high;
        tierEl.style.color = ctx.tier === "extreme" ? "#BF3A2B" : "#E07B39";
        document.getElementById("tt-tv").textContent = ctx.overall.toFixed(2);

        document.getElementById("tt-dims").innerHTML = [...dims]
          .reverse()
          .map((d) => {
            const patch = patches.find((p) => p.dim.key === d.key);
            const fill = patch?.fill || d.color;
            return `<div class="tt-dr">
        <span class="tt-dn">${d.label}</span>
        <div class="tt-bg"><div class="tt-fill" style="width:${(6 - ctx[d.key]) * 20}%;background:${fill}"></div></div>
        <span class="tt-dv">${ctx[d.key]}</span>
      </div>`;
          })
          .join("");

        // Position
        const vw = window.innerWidth,
          vh = window.innerHeight;
        let x = ev.clientX + 14,
          y = ev.clientY - 12;
        if (x + 240 > vw) x = ev.clientX - 244;
        if (y + 280 > vh) y = vh - 285;
        tt.style.left = x + "px";
        tt.style.top = y + "px";
        tt.classList.add("on");
      }

      function hideTip() {
        tt.classList.remove("on");
      }

      function resetAll() {
        arcGroups.forEach((ag) => {
          ag.patches.forEach(({ path, dim, j }) => {
            const fade = activeDim && dim.key !== activeDim;
            path.attr("opacity", fade ? 0.5: 1); // Determine opacity based on active dimension
          });
          ag.g.selectAll(".ctry-lbl").attr("fill-opacity", 1);
        });
      }

      function handleClick(i) {
        const ctx = contexts[i];
        window.open("https://www.oecd.org/" + lang + "/data/dashboards/multidimensional-fragility/fragility-profiles.html?oecdcontrol-chart-control-bar-b8282fc8a2-var1=" + ctx.iso3.toLowerCase(), "_blank");
        if (highlighted === i) {
          highlighted = null;
          resetAll();
          return;
        }
        highlighted = i;
        arcGroups.forEach((ag, j) => {
          const fade = j !== i;
          ag.patches.forEach(({ path }) =>
            path.attr("opacity", fade ? 0.1 : 1),
          );
          ag.g.selectAll(".ctry-lbl").attr("fill-opacity", fade ? 0.12 : 1);
        });
      }

      // Dimension filter
      const handleDimensionClick = (key) => {
        activeDim = activeDim === key ? null : key;
        sortByDim = activeDim; // Update sort dimension
        highlighted = null;
        document.querySelectorAll(".dim-row").forEach((e) => {
          e.classList.toggle(
            "faded",
            !!activeDim && e.dataset.key !== activeDim,
          );
          e.classList.toggle("active", e.dataset.key === activeDim);
        });
        document.querySelectorAll(".scale-row").forEach((e) => {
          e.classList.toggle(
            "faded",
            !!activeDim && e.dataset.key !== activeDim,
          );
          e.classList.toggle("active", e.dataset.key === activeDim);
        });
        redrawVisualization(); // Redraw with new sort order
        resetAll();
      };

      document.querySelectorAll(".scale-row").forEach((el) => {
        el.addEventListener("click", () => {
          handleDimensionClick(el.dataset.key);
        });
      });

      // Search
      document.getElementById("search").addEventListener("input", function () {
        const q = this.value.toLowerCase().trim();
        if (!q) {
          highlighted = null;
          resetAll();
          return;
        }
        const idx = contexts.findIndex((c) => c[nameKey].toLowerCase().includes(q));
        if (idx >= 0) handleClick(idx);
        else {
          highlighted = null;
          resetAll();
        }
      });

      // ── Entrance animation ─────────────────────────────────────────────────────────
      arcGroups.forEach(({ patches }, i) => {
        patches.forEach(({ path }, j) => {
          path
            .attr("opacity", 0)
            .transition()
            .delay(i * 16 + j * 4)
            .duration(500)
            .ease(d3.easeCubicOut)
            .attr("opacity", 1);
        });
      });
      }); // end Promise.all
    </script>
  </body>
